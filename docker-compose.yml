services:
  app:
    build: .
    ports:
      # Bind to localhost only — external HTTPS traffic must come through a
      # TLS-terminating reverse proxy (Nginx, Caddy, Traefik) on the same host.
      # "3000:3000" would expose the app on all interfaces without TLS.
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  uploads:
  pgdata:
